client_id = "867f455401f2f96272189df5b152f5ec"
name = "answerly"
application_url = "https://answerly-080a.onrender.com"
embedded = true

[[extensions]]
handle = "faq-block"
name = "Answerly FAQs"
type = "theme"

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/webhooks/compliance"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

[access_scopes]
scopes = "write_metaobject_definitions,write_metaobjects,write_products"

[auth]
redirect_urls = [ "https://answerly-080a.onrender.com/api/auth" ]